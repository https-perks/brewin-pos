{% extends "layout.html" %}
{% block content %}
{% include 'admin/_subnav.html' %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="m-0">Manage Items</h2>
  <div class="d-flex gap-2">
    <button id="saveAllBtn" class="btn btn-success btn-sm d-none" onclick="saveAllItems()">💾 Save All Changes</button>
    <button id="toggleEdit" class="btn btn-secondary btn-sm" onclick="toggleEditMode()">✏️ Edit Mode</button>
  </div>
</div>

<datalist id="categoryOptions"></datalist>
<datalist id="displayGroupOptions"></datalist>
<datalist id="sizeOptions"></datalist>

<div class="card p-3 mb-4">
  <h5>Add Item</h5>

  <form onsubmit="addItem(); return false;">
    <div class="row g-2">
      <div class="col-md-2">
        <input id="sku" placeholder="SKU" class="form-control">
      </div>

      <div class="col-md-3">
        <input id="name" placeholder="Item Name, e.g. Coffee 8oz" class="form-control">
      </div>

      <div class="col-md-2">
        <input id="category" list="categoryOptions" placeholder="Category, e.g. Drinks" class="form-control mb-1">
        <select id="categoryPicker" class="form-select form-select-sm" onchange="chooseCategory('category', this)">
          <option value="">Choose existing...</option>
        </select>
      </div>

      <div class="col-md-2">
        <input id="displayGroup" list="displayGroupOptions" placeholder="Display Group, e.g. Coffee" class="form-control">
      </div>

      <div class="col-md-1">
        <input id="sizeLabel" list="sizeOptions" placeholder="Size" class="form-control">
      </div>

      <div class="col-md-1">
        <input id="price" type="number" step="0.01" placeholder="Price" class="form-control">
      </div>

      <div class="col-md-1">
        <button class="btn btn-primary w-100">Add</button>
      </div>
    </div>

    <small class="text-muted d-block mt-2">
      Category controls the POS side menu. Display Group combines size variants into one POS button. Example: Coffee 8oz and Coffee 12oz both use Display Group “Coffee.”
    </small>
  </form>
</div>

<div class="card p-3">
  <h5>Items</h5>
  <div class="table-responsive">
    <table id="item-table" class="table table-sm table-striped align-middle"></table>
  </div>
</div>

<br>
<br>

<script>
let editMode = false;
let currentItems = [];

function fmtMoney(x) {
  return `$${Number(x || 0).toFixed(2)}`;
}

function fmtPercent(x) {
  return `${Number(x || 0).toFixed(1)}%`;
}

function marginClass(margin) {
  margin = Number(margin || 0);

  if (margin < 0) return "text-danger fw-bold";
  if (margin < 30) return "text-warning fw-bold";
  return "text-success fw-bold";
}

function esc(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function uniqueSorted(values) {
  return [...new Set(
    values
      .map(v => String(v || '').trim())
      .filter(Boolean)
  )].sort((a, b) => a.localeCompare(b));
}

function updateDatalist(id, values) {
  const list = document.getElementById(id);
  if (!list) return;

  list.innerHTML = '';

  uniqueSorted(values).forEach(value => {
    const opt = document.createElement('option');
    opt.value = value;
    list.appendChild(opt);
  });
}

function updateCategoryPicker(values) {
  const picker = document.getElementById('categoryPicker');
  if (!picker) return;

  const previous = picker.value;
  picker.innerHTML = '<option value="">Choose existing...</option>';

  uniqueSorted(values).forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = cat;
    picker.appendChild(opt);
  });

  picker.value = previous;
}

function chooseCategory(inputId, selectEl) {
  if (!selectEl.value) return;

  const input = document.getElementById(inputId);
  if (input) input.value = selectEl.value;

  selectEl.value = '';
}

function updateItemSuggestions(items) {
  const categories = items.map(it => it.category);

  updateDatalist('categoryOptions', categories);
  updateCategoryPicker(categories);
  updateDatalist('displayGroupOptions', items.map(it => it.display_group || it.name));
  updateDatalist('sizeOptions', items.map(it => it.size_label).concat(['8oz', '12oz', '16oz']));
}

function toggleEditMode(){
  editMode = !editMode;
  document.getElementById('toggleEdit').innerText = editMode ? '✅ Done Editing' : '✏️ Edit Mode';
  document.getElementById('saveAllBtn').classList.toggle('d-none', !editMode);
  loadItems();
}

function loadItems(){
  fetch('/api/items')
    .then(r=>r.json())
    .then(items=>{
      currentItems = items;
      updateItemSuggestions(items);

      let html = `
        <thead>
          <tr>
            <th>SKU</th>
            <th>Name</th>
            <th>Category</th>
            <th>Display Group</th>
            <th>Size</th>
            <th class="text-end">Price</th>
            <th class="text-end">Cost</th>
            <th class="text-end">Gross Profit</th>
            <th class="text-end">Margin</th>
            ${editMode ? '<th class="text-end">Actions</th>' : ''}
          </tr>
        </thead>
        <tbody>
      `;

      items.forEach(it=>{
        const price = Number(it.price || 0);
        const cost = Number(it.item_cost || 0);
        const grossProfit = Number(it.gross_profit || 0);
        const margin = Number(it.margin_percent || 0);

        if(editMode){
          html += `
            <tr data-item-id="${it.id}">
              <td>${esc(it.sku || '')}</td>
              <td><input class="form-control form-control-sm" id="name-${it.id}" value="${esc(it.name || '')}"></td>
              <td>
                <input class="form-control form-control-sm mb-1" list="categoryOptions" id="cat-${it.id}" value="${esc(it.category || '')}">
              </td>
              <td><input class="form-control form-control-sm" list="displayGroupOptions" id="group-${it.id}" value="${esc(it.display_group || '')}"></td>
              <td><input class="form-control form-control-sm" list="sizeOptions" id="size-${it.id}" value="${esc(it.size_label || '')}"></td>
              <td><input type="number" step="0.01" class="form-control form-control-sm text-end" id="price-${it.id}" value="${price}"></td>
              <td class="text-end">${fmtMoney(cost)}</td>
              <td class="text-end">${fmtMoney(grossProfit)}</td>
              <td class="text-end ${marginClass(margin)}">${fmtPercent(margin)}</td>
              <td class="text-end">
                <button class="btn btn-sm btn-success" onclick="saveItem(${it.id})">💾</button>
                <button class="btn btn-sm btn-danger" onclick="deleteItem(${it.id})">🗑️</button>
              </td>
            </tr>`;
        } else {
          html += `
            <tr>
              <td>${esc(it.sku || '')}</td>
              <td>${esc(it.name || '')}</td>
              <td>${esc(it.category || '')}</td>
              <td>${esc(it.display_group || '')}</td>
              <td>${esc(it.size_label || '')}</td>
              <td class="text-end">${fmtMoney(price)}</td>
              <td class="text-end">${fmtMoney(cost)}</td>
              <td class="text-end">${fmtMoney(grossProfit)}</td>
              <td class="text-end ${marginClass(margin)}">${fmtPercent(margin)}</td>
            </tr>`;
        }
      });

      html += `</tbody>`;
      document.getElementById('item-table').innerHTML = html;
    });
}

function getItemPayload(id){
  return {
    id: id,
    name: document.getElementById('name-'+id).value.trim(),
    category: document.getElementById('cat-'+id).value.trim(),
    display_group: document.getElementById('group-'+id).value.trim(),
    size_label: document.getElementById('size-'+id).value.trim(),
    price: parseFloat(document.getElementById('price-'+id).value||0)
  };
}

function saveItem(id){
  const payload = getItemPayload(id);

  fetch('/api/admin/update_item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  }).then(()=>loadItems());
}

async function saveAllItems(){
  if (!editMode) return;

  const ids = currentItems.map(it => it.id);
  const saveBtn = document.getElementById('saveAllBtn');
  const originalText = saveBtn.innerText;

  saveBtn.disabled = true;
  saveBtn.innerText = 'Saving...';

  try {
    for (const id of ids) {
      const payload = getItemPayload(id);

      const res = await fetch('/api/admin/update_item',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload)
      });

      if (!res.ok) {
        throw new Error(`Failed to save item #${id}`);
      }
    }

    alert('All item changes saved.');
    loadItems();
  } catch (err) {
    alert('Could not save all changes: ' + err.message);
  } finally {
    saveBtn.disabled = false;
    saveBtn.innerText = originalText;
  }
}

function deleteItem(id){
  if(!confirm('Delete this item?')) return;

  fetch('/api/admin/delete_item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id:id})
  }).then(()=>loadItems());
}

function addItem(){
  const skuField = document.getElementById('sku');
  const nameField = document.getElementById('name');
  const categoryField = document.getElementById('category');
  const displayGroupField = document.getElementById('displayGroup');
  const sizeLabelField = document.getElementById('sizeLabel');
  const priceField = document.getElementById('price');

  const payload = {
    sku: skuField.value.trim(),
    name: nameField.value.trim(),
    category: categoryField.value.trim(),
    display_group: displayGroupField.value.trim(),
    size_label: sizeLabelField.value.trim(),
    price: parseFloat(priceField.value || 0)
  };

  if (!payload.name){
    alert("Please enter an item name.");
    return;
  }

  fetch('/api/admin/add_item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  }).then(()=>{
    skuField.value = '';
    nameField.value = '';
    categoryField.value = '';
    displayGroupField.value = '';
    sizeLabelField.value = '';
    priceField.value = '';
    loadItems();
  });
}

loadItems();
</script>
{% endblock %}
