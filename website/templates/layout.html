<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Gardiner Brew In</title>

  <style>
    /* Disable dragging window globally */
    * { -webkit-app-region: no-drag !important; }

    /* Transparent overlay forcing no-drag everywhere */
    #nodrag-mask {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 999999;
      -webkit-app-region: no-drag;
      pointer-events: none;
    }
  </style>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <img src="{{ url_for('static', filename='img/header-icon.png') }}"
            alt="Logo"
            style="height:28px; width:auto;">
        <span>The Gardiner Brew In</span>
    </a>
    <div class="navbar-nav">
      <a class="nav-link" href="/pos">POS</a>
      <a class="nav-link" href="/reports/receipts">Reports</a>
      <a class="nav-link" href="/admin/items">Admin</a>
    </div>
  </div>
</nav>

<div class="container mt-4">
  {% block content %}{% endblock %}
</div>

<script src="{{ url_for('static', filename='js/pos_lockdown.js') }}"></script>

<script>
window.addEventListener("pywebviewready", () => {
    // Secondary script-level override
    document.documentElement.style.setProperty('-webkit-app-region', 'no-drag');
});
</script>

<!-- Transparent no-drag overlay -->
<div id="nodrag-mask"></div>

</body>
</html>
